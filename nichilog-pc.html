<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,initial-scale=1">
<meta name="format-detection" content="telephone=no">
<meta name="robots" content="noindex">
<title>ニチログ PC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:"Hiragino Sans","Yu Gothic",system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#1f2937;font-size:14px;min-height:100vh}
body.logged-out{display:flex;align-items:center;justify-content:center;min-height:100vh}
a{color:#1976D2;text-decoration:none}
input,select,textarea,button{font-family:inherit;font-size:14px}
button{cursor:pointer}
table{border-collapse:collapse;width:100%;background:#fff}
th,td{padding:10px 12px;border-bottom:1px solid #e5e7eb;text-align:left}
th{background:#eef2f7;font-weight:600;color:#374151;font-size:13px}
tr:hover td{background:#fafbfc}

/* ===== Login Card ===== */
.login-wrap{width:400px;background:#fff;border-radius:12px;padding:32px;box-shadow:0 6px 24px rgba(0,0,0,.08)}
.login-wrap h1{font-size:22px;margin-bottom:6px;color:#1976D2}
.login-wrap .sub{color:#6b7280;font-size:13px;margin-bottom:24px}
.login-wrap .fg{margin-bottom:14px}
.login-wrap label{display:block;font-size:13px;color:#374151;margin-bottom:4px;font-weight:500}
.login-wrap input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px}
.login-wrap .err{color:#dc2626;font-size:13px;margin:10px 0;display:none}
.login-wrap .login-btn{width:100%;padding:12px;background:#1976D2;color:#fff;border:none;border-radius:8px;font-weight:600;margin-top:8px}
.login-wrap .login-btn:hover{background:#1565c0}
.login-wrap .toggle{text-align:center;margin-top:16px;font-size:13px;color:#6b7280}
.login-wrap .toggle a{color:#1976D2;cursor:pointer}

/* ===== App Layout (PC) ===== */
.app-layout{display:none;min-height:100vh}
body.logged-in .app-layout{display:flex}
body.logged-in .login-wrap{display:none}

.pc-sidebar{width:220px;min-width:220px;background:#1976D2;color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.pc-sidebar .brand{padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.18);font-weight:700;font-size:16px}
.pc-sidebar .brand .co{font-size:13px;opacity:.85;font-weight:400;margin-top:2px}
.pc-sidebar nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:10px;padding:11px 20px;color:#fff;cursor:pointer;font-size:14px;border-left:3px solid transparent;user-select:none}
.sb-item:hover{background:rgba(255,255,255,.08)}
.sb-item.active{background:rgba(255,255,255,.15);border-left-color:#fff;font-weight:600}
.sb-item .ic{width:18px;display:inline-block;text-align:center}
.pc-sidebar .logout-btn{margin:12px;padding:10px;background:rgba(0,0,0,.15);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:6px;font-size:13px}
.pc-sidebar .logout-btn:hover{background:rgba(0,0,0,.3)}

.pc-main{flex:1;min-width:0;padding:24px 32px;overflow-x:auto}
.pc-main h2{font-size:20px;margin-bottom:16px;color:#1f2937;font-weight:700}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ===== Common Buttons ===== */
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:14px;font-weight:500}
.btn-primary{background:#1976D2;color:#fff}
.btn-primary:hover{background:#1565c0}
.btn-success{background:#16a34a;color:#fff}
.btn-success:hover{background:#15803d}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-secondary{background:#e5e7eb;color:#374151}
.btn-secondary:hover{background:#d1d5db}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.stat-row{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:8px;padding:16px 20px;min-width:180px;box-shadow:0 1px 3px rgba(0,0,0,.05);border-left:4px solid #1976D2}
.stat-card .lbl{font-size:12px;color:#6b7280}
.stat-card .val{font-size:22px;font-weight:700;color:#1f2937;margin-top:4px}

/* ===== Calendar ===== */
.cal-nav{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.cal-nav .mon{font-size:18px;font-weight:700;min-width:160px;text-align:center}
.cal-table{width:100%;table-layout:fixed;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.cal-table th{background:#eef2f7;padding:10px;text-align:center;font-size:13px;font-weight:600}
.cal-table th.sun{color:#dc2626}
.cal-table th.sat{color:#1976D2}
.cal-table td{padding:0;border:1px solid #e5e7eb;vertical-align:top;height:90px}
.cal-cell{height:100%;padding:6px 8px;cursor:pointer;position:relative;font-size:13px}
.cal-cell:hover{background:#f3f9ff}
.cal-cell .d{font-weight:600}
.cal-cell.sun .d{color:#dc2626}
.cal-cell.sat .d{color:#1976D2}
.cal-cell.today{background:#e3f2fd}
.cal-cell.today .d{color:#1976D2}
.cal-cell.empty{background:#f9fafb;cursor:default}
.cal-cell .dot{display:inline-block;width:8px;height:8px;background:#1976D2;border-radius:50%;margin-left:4px;vertical-align:middle}
.cal-cell .mini{font-size:11px;color:#6b7280;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ===== Forms ===== */
.form-card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.form-card h3{font-size:15px;margin-bottom:12px;color:#1f2937}
.form-row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.form-grp{flex:1;min-width:160px}
.form-grp label{display:block;font-size:12px;color:#6b7280;margin-bottom:3px;font-weight:500}
.form-grp input,.form-grp select,.form-grp textarea{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px}
.form-grp input:focus,.form-grp select:focus,.form-grp textarea:focus{outline:none;border-color:#1976D2}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:40px!important}
.pw-toggle{position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;padding:4px 8px;color:#555;line-height:1;user-select:none}
.pw-toggle:hover{color:#000}
.form-grp textarea{resize:vertical;min-height:60px}

/* ===== Modal ===== */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:10px;padding:24px;max-width:540px;width:90%;max-height:88vh;overflow-y:auto}
.modal-box h3{margin-bottom:16px;font-size:17px}
.modal-box .btn-group{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* ===== Badge ===== */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-master{background:#fee2e2;color:#991b1b}
.badge-admin{background:#e0e7ff;color:#3730a3}
.badge-worker{background:#dcfce7;color:#166534}
.badge-half{background:#fff7ed;color:#9a3412}
.badge-full{background:#ecfdf5;color:#065f46}
.badge-draft{background:#f3f4f6;color:#374151}
.badge-issued{background:#dbeafe;color:#1e40af}
.badge-paid{background:#d1fae5;color:#065f46}

/* ===== Toast ===== */
.toast{position:fixed;bottom:20px;right:20px;background:#1f2937;color:#fff;padding:12px 24px;border-radius:8px;z-index:99999;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.2)}

/* ===== Invoice Overlay ===== */
.inv-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#f5f5f5;z-index:9999;overflow-y:auto;display:none}
.inv-overlay.show{display:block}
.inv-overlay .toolbar{position:sticky;top:0;background:#333;color:#fff;padding:10px 16px;display:flex;gap:10px;align-items:center;z-index:1}
.inv-overlay .toolbar button{padding:6px 14px;border:none;border-radius:4px;font-size:13px}
.inv-overlay .toolbar .btn-close{background:#666;color:#fff}
.inv-overlay .toolbar .btn-print{background:#1a73e8;color:#fff}
.inv-wrap{max-width:900px;margin:16px auto;padding:16px;display:flex;flex-direction:column;gap:18px}
.inv-form-panel,.inv-preview-panel{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.inv-form-panel h4,.inv-preview-panel h4{font-size:14px;margin-bottom:10px;color:#374151}
.inv-detail-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}
.inv-detail-table th{background:#f0f0f0;padding:5px;border:1px solid #ccc;font-size:12px}
.inv-detail-table td{padding:2px;border:1px solid #ccc}
.inv-detail-table input,.inv-detail-table select{width:100%;padding:3px 5px;border:1px solid #ddd;border-radius:3px;font-size:12px}
.inv-detail-table .btn-sm{background:#dc2626;color:#fff;padding:3px 8px;font-size:11px}
.invoice-page{background:#fff;padding:10mm 12mm;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:9pt;color:#333;border:1px solid #ddd;min-height:280mm}
.invoice-page .title-line{text-align:center;font-size:18pt;letter-spacing:6px;padding:5mm 0 2mm;border-bottom:2px solid #333;margin-bottom:4mm}
.invoice-page .ln{margin:2mm 0}
.invoice-page table.inv-pre{width:100%;border-collapse:collapse;margin-top:4mm}
.invoice-page table.inv-pre th,.invoice-page table.inv-pre td{border:1px solid #333;padding:2mm;font-size:9pt}
.invoice-page table.inv-pre th{background:#eee}

.receipt-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#f5f5f5;z-index:9999;overflow-y:auto;display:none}
.receipt-overlay.show{display:block}
.receipt-overlay .toolbar{position:sticky;top:0;background:#333;color:#fff;padding:10px 16px;display:flex;gap:10px;align-items:center;z-index:1}
.receipt-overlay .toolbar button{padding:6px 14px;border:none;border-radius:4px;font-size:13px}
.receipt-overlay .toolbar .btn-close{background:#666;color:#fff}
.receipt-overlay .toolbar .btn-print{background:#1a73e8;color:#fff}
.receipt-page{width:210mm;min-height:100mm;background:#fff;margin:16px auto;padding:14mm;box-shadow:0 2px 8px rgba(0,0,0,.15);font-family:"Hiragino Mincho ProN","Yu Mincho",serif}

/* ===== Empty state ===== */
.empty{text-align:center;padding:40px;color:#9ca3af;background:#fff;border-radius:8px;margin:16px 0}

@media print{
@page{size:A4 portrait;margin:5mm}
body{background:#fff!important}
.pc-sidebar,.pc-main>.btn-row,.inv-overlay .toolbar,.receipt-overlay .toolbar,.inv-form-panel{display:none!important}
.inv-wrap{display:block!important;padding:0!important;margin:0!important}
.inv-preview-panel{box-shadow:none!important;padding:0!important}
}
</style>
</head>
<body class="logged-out">

<!-- ==================== Login Screen ==================== -->
<div class="login-wrap" id="loginScreen">
<h1>ニチログ PC</h1>
<div class="sub">建設工事・出勤管理システム</div>
<div id="loginForm">
<div class="fg"><label>会社名</label><input id="loginCompany" type="text" autocomplete="organization"></div>
<div class="fg"><label>お名前</label><input id="loginName" type="text" autocomplete="name"></div>
<div class="fg"><label>パスワード</label><input id="loginPassword" type="password" autocomplete="current-password"></div>
<div class="err" id="loginError"></div>
<button class="login-btn" onclick="doLogin()">ログイン</button>
<div class="toggle">アカウントをお持ちでない方は <a onclick="toggleRegister(true)">新規登録</a></div>
</div>
<div id="registerForm" style="display:none">
<div class="fg"><label>会社名</label><input id="regCompany" type="text"></div>
<div class="fg"><label>お名前</label><input id="regName" type="text"></div>
<div class="fg"><label>パスワード</label><input id="regPassword" type="password"></div>
<div class="fg"><label>ロール</label><select id="regRole"><option value="master">社長</option><option value="admin">管理者</option><option value="worker">作業員</option></select></div>
<div class="err" id="regError"></div>
<button class="login-btn" onclick="doRegister()">登録</button>
<div class="toggle"><a onclick="toggleRegister(false)">ログイン画面に戻る</a></div>
</div>
</div>

<!-- ==================== App Layout ==================== -->
<div class="app-layout" id="appLayout">
<div class="pc-sidebar" role="navigation">
<div class="brand"><div id="sbCompany">-</div><div class="co" id="sbUser">-</div></div>
<nav id="sbNav">
<div class="sb-item active" data-tab="1" onclick="switchTab(1)"><span class="ic">◉</span>カレンダー</div>
<div class="sb-item" data-tab="2" onclick="switchTab(2)"><span class="ic">◈</span>サマリー</div>
<div class="sb-item" data-tab="3" onclick="switchTab(3)"><span class="ic">◆</span>現場</div>
<div class="sb-item" data-tab="4" onclick="switchTab(4)"><span class="ic">◎</span>メンバー</div>
<div class="sb-item" data-tab="5" onclick="switchTab(5)"><span class="ic">◇</span>請求</div>
<div class="sb-item" data-tab="6" onclick="switchTab(6)"><span class="ic">◐</span>設定</div>
</nav>
<button class="logout-btn" onclick="doLogout()">ログアウト</button>
</div>

<div class="pc-main" role="region">
<!-- Tab 1: Calendar -->
<div class="tab-panel active" id="tab1"></div>
<!-- Tab 2: Summary -->
<div class="tab-panel" id="tab2"></div>
<!-- Tab 3: Sites -->
<div class="tab-panel" id="tab3"></div>
<!-- Tab 4: Members -->
<div class="tab-panel" id="tab4"></div>
<!-- Tab 5: Invoices -->
<div class="tab-panel" id="tab5"></div>
<!-- Tab 6: Settings -->
<div class="tab-panel" id="tab6"></div>
</div>
</div>

<!-- ==================== Modals ==================== -->
<div class="modal" id="dayDetailModal">
<div class="modal-box">
<h3 id="ddTitle">出勤記録</h3>
<div id="ddBody"></div>
<div class="btn-group">
<button class="btn btn-primary" onclick="showAddE()">＋ 追加</button>
<button class="btn btn-secondary" onclick="clModal()">閉じる</button>
</div>
</div>
</div>

<div class="modal" id="addEntryModal">
<div class="modal-box">
<h3>出勤記録を追加</h3>
<div class="form-row"><div class="form-grp"><label>日付</label><input type="date" id="aeDate"></div></div>
<div class="form-row"><div class="form-grp"><label>メンバー</label><select id="aeMember"></select></div></div>
<div class="form-row"><div class="form-grp"><label>取引先</label><select id="aeClient" onchange="filterSitesByClient()"></select></div></div>
<div class="form-row"><div class="form-grp"><label>現場</label><select id="aeSite"></select></div></div>
<div class="form-row"><div class="form-grp"><label>勤務区分</label><select id="aeType"><option value="full">1日（全日）</option><option value="half">半日</option></select></div></div>
<div class="form-row"><div class="form-grp"><label>備考</label><textarea id="aeNote"></textarea></div></div>
<div class="btn-group"><button class="btn btn-secondary" onclick="clModal()">キャンセル</button><button class="btn btn-primary" onclick="saveEntry()">保存</button></div>
</div>
</div>

<div class="modal" id="editEntryModal">
<div class="modal-box">
<h3>出勤記録を編集</h3>
<input type="hidden" id="eeId">
<div class="form-row"><div class="form-grp"><label>日付</label><input type="date" id="eeDate"></div></div>
<div class="form-row"><div class="form-grp"><label>メンバー</label><select id="eeMember"></select></div></div>
<div class="form-row"><div class="form-grp"><label>取引先</label><select id="eeClient" onchange="filterEditSites()"></select></div></div>
<div class="form-row"><div class="form-grp"><label>現場</label><select id="eeSite"></select></div></div>
<div class="form-row"><div class="form-grp"><label>勤務区分</label><select id="eeType"><option value="full">1日（全日）</option><option value="half">半日</option></select></div></div>
<div class="form-row"><div class="form-grp"><label>備考</label><textarea id="eeNote"></textarea></div></div>
<div class="btn-group"><button class="btn btn-secondary" onclick="clModal()">キャンセル</button><button class="btn btn-primary" onclick="updateEntry()">更新</button></div>
</div>
</div>

<div class="modal" id="siteModal">
<div class="modal-box">
<h3 id="smTitle">現場</h3>
<input type="hidden" id="smId">
<div class="form-row"><div class="form-grp"><label>取引先</label><select id="smClient"></select></div></div>
<div class="form-row"><div class="form-grp"><label>現場名</label><input type="text" id="smName"></div></div>
<div class="form-row"><div class="form-grp"><label>単価</label><input type="number" id="smPrice" value="25000"></div><div class="form-grp"><label>タイプ</label><select id="smType"><option value="人工">人工</option><option value="常傭">常傭</option><option value="請負">請負</option></select></div></div>
<div class="btn-group"><button class="btn btn-secondary" onclick="clModal()">キャンセル</button><button class="btn btn-primary" onclick="saveSite()">保存</button></div>
</div>
</div>

<div class="modal" id="clientModal">
<div class="modal-box">
<h3 id="cmTitle">取引先</h3>
<input type="hidden" id="cmId">
<div class="form-row"><div class="form-grp"><label>取引先名</label><input type="text" id="cmName"></div></div>
<div class="btn-group"><button class="btn btn-secondary" onclick="clModal()">キャンセル</button><button class="btn btn-primary" onclick="saveClient()">保存</button></div>
</div>
</div>

<div class="modal" id="memberModal">
<div class="modal-box">
<h3 id="mmTitle">メンバー</h3>
<input type="hidden" id="mmId">
<div class="form-row"><div class="form-grp"><label>名前</label><input type="text" id="mmName"></div></div>
<div class="form-row"><div class="form-grp"><label>ロール</label><select id="mmRole"><option value="master">社長</option><option value="admin">管理者</option><option value="worker">作業員</option></select></div><div class="form-grp"><label>チーム</label><input type="text" id="mmTeam"></div></div>
<div class="form-row"><div class="form-grp"><label>新規パスワード（登録時のみ必須・4文字以上）</label><div class="pw-wrap"><input type="password" id="mmPw" placeholder="変更しない場合は空欄"><button type="button" class="pw-toggle" onclick="togglePw('mmPw',this)" title="表示/非表示" aria-label="パスワード表示切替">👁</button></div></div></div>
<div class="btn-group"><button class="btn btn-secondary" onclick="clModal()">キャンセル</button><button class="btn btn-primary" onclick="saveMember()">保存</button></div>
</div>
</div>

<!-- ==================== Invoice Overlay ==================== -->
<div class="inv-overlay" id="invoiceOverlay">
<div class="toolbar">
<button class="btn-close" onclick="closeInvoice()">閉じる</button>
<button class="btn-print" onclick="onClickInvoicePdf()">PDF作成</button>
<span style="flex:1"></span>
<span style="font-size:13px">請求書</span>
</div>
<div class="inv-wrap">
<div class="inv-form-panel">
<h4>請求書入力</h4>
<div class="form-row"><div class="form-grp"><label>請求番号</label><input id="invNo" type="text"></div><div class="form-grp"><label>発行日</label><input id="invDate" type="date"></div></div>
<div class="form-row"><div class="form-grp"><label>支払期日</label><input id="invDue" type="date"></div><div class="form-grp"><label>ステータス</label><select id="invStatusSelect"><option value="下書き">下書き</option><option value="発行済">発行済</option><option value="入金済">入金済</option></select></div></div>
<div class="form-row"><div class="form-grp"><label>宛先（取引先）</label><input id="invTo" type="text"></div><div class="form-grp"><label>担当者</label><input id="invTanto" type="text"></div></div>
<div class="form-row"><div class="form-grp"><label>工事名</label><input id="invSiteName" type="text"></div><div class="form-grp"><label>差出人</label><input id="invFrom" type="text"></div></div>
<div class="form-row"><div class="form-grp"><label>インボイス登録番号</label><input id="invRegNo" type="text" placeholder="T0000000000000"></div></div>
<h4 style="margin-top:12px">カレンダーから自動反映</h4>
<div class="form-row">
<div class="form-grp"><label>取引先を選択</label><select id="invCalClient"></select></div>
<div class="form-grp"><label>対象月</label><input type="month" id="invCalMonth"></div>
<div class="form-grp" style="align-self:flex-end"><button class="btn btn-primary btn-sm" onclick="fillInvoiceFromCalendar()">▶ カレンダーから取り込む</button></div>
</div>
<h4 style="margin-top:12px">明細</h4>
<table class="inv-detail-table" id="invDetailTable">
<thead><tr><th style="width:30%">品名</th><th style="width:20%">仕様</th><th style="width:9%">数量</th><th style="width:12%">単位</th><th style="width:15%">単価</th><th style="width:9%">操作</th></tr></thead>
<tbody id="invDetailBody"></tbody>
</table>
<button class="btn btn-secondary btn-sm" style="margin-top:6px" onclick="addInvRowManual()">＋ 行を追加</button>

// ============================================================
// Helpers
// ============================================================
function localDateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function gSN(i){return ['日','月','火','水','木','金','土'][i];}
function gMN(m){return (m+1)+'月';}
function isWorker(){return currentUser&&currentUser.role==='worker';}
function canSeeRevenue(){return currentUser&&(currentUser.role==='master'||currentUser.role==='admin');}
function canManage(){return currentUser&&(currentUser.role==='master'||currentUser.role==='admin');}
function roleLabel(r){return{master:'社長',admin:'管理者',worker:'作業員'}[r]||r||'-';}
function showToast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},2200);}
function escHtml(s){if(s==null)return '';return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function clModal(){document.querySelectorAll('.modal').forEach(function(m){m.classList.remove('show');});}
// パスワード表示/非表示トグル（type属性 password ↔ text）
function togglePw(inputId,btn){
  var el=document.getElementById(inputId);if(!el)return;
  if(el.type==='password'){el.type='text';if(btn)btn.textContent='🙈';}
  else{el.type='password';if(btn)btn.textContent='👁';}
}
function showLoginError(msg){var el=document.getElementById('loginError');el.textContent=msg;el.style.display='block';}
function showRegError(msg){var el=document.getElementById('regError');el.textContent=msg;el.style.display='block';}
function toggleRegister(show){document.getElementById('loginForm').style.display=show?'none':'';document.getElementById('registerForm').style.display=show?'':'none';}

// ============================================================
// REST helpers (Supabase REST, copied from existing pc.html)
// ============================================================
async function getAuthToken(){const{data:{session}}=await sb.auth.getSession();return session&&session.access_token||SK;}
async function getH(){var t=await getAuthToken();return{'apikey':SK,'Authorization':'Bearer '+t,'Content-Type':'application/json'};}
async function sbGet(table,filters){filters=filters||'';const token=await getAuthToken();const u=SB+'/rest/v1/'+table+(filters?'?'+filters:'');const res=await fetch(u,{headers:{'apikey':SK,'Authorization':'Bearer '+token,'Content-Type':'application/json'}});if(!res.ok){console.error('sbGet',table,res.status);return[];}return res.json();}
// 直近のSupabaseエラーを保持（UIで原因表示するため）
window._lastSbError=null;
async function sbPost(table,data){
  const token=await getAuthToken();
  const res=await fetch(SB+'/rest/v1/'+table,{method:'POST',headers:{'apikey':SK,'Authorization':'Bearer '+token,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(data)});
  if(!res.ok){
    const body=await res.text().catch(function(){return '';});
    console.error('sbPost FAIL',{table:table,status:res.status,body:body,payload:data});
    window._lastSbError={method:'POST',table:table,status:res.status,body:body,payload:data};
    return null;
  }
  window._lastSbError=null;
  const arr=await res.json();return arr[0]||arr;
}
async function sbPatch(table,filters,data){
  const token=await getAuthToken();
  const res=await fetch(SB+'/rest/v1/'+table+'?'+filters,{method:'PATCH',headers:{'apikey':SK,'Authorization':'Bearer '+token,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(data)});
  if(!res.ok){
    const body=await res.text().catch(function(){return '';});
    console.error('sbPatch FAIL',{table:table,filters:filters,status:res.status,body:body,payload:data});
    window._lastSbError={method:'PATCH',table:table,filters:filters,status:res.status,body:body,payload:data};
    return null;
  }
  window._lastSbError=null;
  const arr=await res.json();return arr[0]||arr;
}
async function sbDelete(table,filters){
  const token=await getAuthToken();
  const res=await fetch(SB+'/rest/v1/'+table+'?'+filters,{method:'DELETE',headers:{'apikey':SK,'Authorization':'Bearer '+token,'Content-Type':'application/json'}});
  if(!res.ok){
    const body=await res.text().catch(function(){return '';});
    console.error('sbDelete FAIL',{table:table,filters:filters,status:res.status,body:body});
    window._lastSbError={method:'DELETE',table:table,filters:filters,status:res.status,body:body};
    return false;
  }
  window._lastSbError=null;
  return true;
}
// エラー表示ヘルパ: Supabase エラーの詳細を toast + alert + console に出す
function sbErrMsg(prefix){
  const e=window._lastSbError;
  if(!e)return prefix||'エラー';
  let detail=(e.body||'').slice(0,240);
  return (prefix||'エラー')+' ['+e.status+'] '+detail;
}

// ============================================================
// Auth
// ============================================================
async function doLogin(){
  const comp=document.getElementById('loginCompany').value.trim();
  const nm=document.getElementById('loginName').value.trim();
  const pw=document.getElementById('loginPassword').value;
  if(!comp||!nm||!pw){showLoginError('全項目を入力してください');return;}
  try{
    const{data:email,error:luErr}=await sb.rpc('login_lookup',{p_company:comp,p_name:nm});
    if(luErr||!email){showLoginError('会社名または名前が見つかりません');return;}
    const{data:authData,error:authErr}=await sb.auth.signInWithPassword({email:email,password:pw});
    if(authErr){showLoginError('パスワードが正しくありません');return;}
    const accs=await sbGet('accounts','name=eq.'+encodeURIComponent(nm));
    if(!accs||accs.length===0){showLoginError('アカウント情報の取得に失敗');return;}
    currentUser=accs[0];
    const comps=await sbGet('companies','id=eq.'+currentUser.company_id);
    company=comps[0];
    await enterApp();
  }catch(e){showLoginError('ログインエラー: '+e.message);}
}
async function doRegister(){
  const comp=document.getElementById('regCompany').value.trim();
  const nm=document.getElementById('regName').value.trim();
  const pw=document.getElementById('regPassword').value;
  const role=document.getElementById('regRole').value;
  if(!comp||!nm||!pw){showRegError('全項目を入力してください');return;}
  if(pw.length<4){showRegError('パスワードは4文字以上で入力してください');return;}
  try{
    const tempEmail=crypto.randomUUID()+'@nichilog.app';
    const{data:authData,error:signUpErr}=await sb.auth.signUp({email:tempEmail,password:pw});
    if(signUpErr){showRegError('登録エラー: '+signUpErr.message);return;}
    const{data:regData,error:regErr}=await sb.rpc('complete_registration',{p_company:comp,p_name:nm,p_role:role,p_team:''});
    if(regErr){showRegError('登録完了エラー: '+regErr.message);return;}
    const accs=await sbGet('accounts','auth_uid=eq.'+authData.user.id);
    if(!accs||accs.length===0){showRegError('アカウント取得失敗');return;}
    currentUser=accs[0];
    const comps=await sbGet('companies','id=eq.'+currentUser.company_id);
    company=comps[0];
    await enterApp();
    showToast('登録完了');
  }catch(e){showRegError('登録エラー: '+e.message);}
}
async function doLogout(){
  try{await sb.auth.signOut();}catch(e){}
  currentUser=null;company=null;entries=[];sites=[];clientCompanies=[];members=[];invoices=[];
  document.body.classList.remove('logged-in');document.body.classList.add('logged-out');
  document.getElementById('loginPassword').value='';
  document.getElementById('loginError').style.display='none';
}
async function enterApp(){
  document.body.classList.remove('logged-out');document.body.classList.add('logged-in');
  document.getElementById('sbCompany').textContent=(company&&company.name)||'-';
  document.getElementById('sbUser').textContent=(currentUser&&currentUser.name)||'-';
  // Hide tab 5 (invoices) menu for worker
  const navInvoice=document.querySelector('.sb-item[data-tab="5"]');
  if(navInvoice)navInvoice.style.display=isWorker()?'none':'';
  await renderAll();
  switchTab(1);
}

// ============================================================
// Tabs
// ============================================================
function switchTab(n){
  if(n===5&&isWorker()){n=1;}
  document.querySelectorAll('.tab-panel').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.sb-item').forEach(function(el){el.classList.remove('active');});
  const panel=document.getElementById('tab'+n);if(panel)panel.classList.add('active');
  const item=document.querySelector('.sb-item[data-tab="'+n+'"]');if(item)item.classList.add('active');
  currentTab=n;
  if(n===1)renderCalendar();
  else if(n===2)renderSummary();
  else if(n===3)renderSites();
  else if(n===4)renderMembers();
  else if(n===5)renderInvoices();
  else if(n===6)renderSettings();
}

// ============================================================
// Data loading
// ============================================================
async function renderAll(){
  if(!company)return;
  members=await sbGet('accounts','company_id=eq.'+company.id);
  sites=await sbGet('work_sites','company_id=eq.'+company.id);
  clientCompanies=await sbGet('client_companies','company_id=eq.'+company.id);
  await ldMo();
  if(!isWorker()){
    try{invoices=await sbGet('invoices','account_id=eq.'+currentUser.id+'&order=issue_date.desc');}catch(e){invoices=[];}
  }
}
async function ldMo(){
  const yr=viewMonth.getFullYear(), mo=viewMonth.getMonth();
  const start=localDateStr(new Date(yr,mo,1));
  const end=localDateStr(new Date(yr,mo+1,0));
  let aq='company_id=eq.'+company.id+'&work_date=gte.'+start+'&work_date=lte.'+end;
  if(isWorker())aq+='&account_id=eq.'+currentUser.id;
  entries=await sbGet('attendance',aq);
}
async function chMo(delta){
  viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+delta,1);
  await ldMo();
  renderCalendar();
}

// ============================================================
// Tab 1: Calendar
// ============================================================
function renderCalendar(){
  const yr=viewMonth.getFullYear(), mo=viewMonth.getMonth();
  const first=new Date(yr,mo,1);
  const last=new Date(yr,mo+1,0);
  const startDay=first.getDay();
  const daysInMonth=last.getDate();
  let html='<h2>カレンダー</h2>';
  html+='<div class="cal-nav">';
  html+='<button class="btn btn-secondary" onclick="chMo(-1)">◀ 前月</button>';
  html+='<div class="mon">'+yr+'年 '+gMN(mo)+'</div>';
  html+='<button class="btn btn-secondary" onclick="chMo(1)">次月 ▶</button>';
  html+='<button class="btn btn-secondary" onclick="viewMonth=new Date();ldMo().then(renderCalendar)">今月</button>';
  html+='</div>';
  html+='<table class="cal-table"><thead><tr>';
  for(let i=0;i<7;i++){const cls=(i===0?'sun':(i===6?'sat':''));html+='<th class="'+cls+'">'+gSN(i)+'</th>';}
  html+='</tr></thead><tbody>';
  let row='<tr>';
  for(let i=0;i<startDay;i++){row+='<td><div class="cal-cell empty"></div></td>';}
  let col=startDay;
  for(let day=1;day<=daysInMonth;day++){
    const dstr=localDateStr(new Date(yr,mo,day));
    const dayOfWeek=new Date(yr,mo,day).getDay();
    const dayEntries=entries.filter(function(e){return e.work_date===dstr;});
    const isToday=dstr===localDateStr(new Date());
    const cls=(dayOfWeek===0?'sun ':(dayOfWeek===6?'sat ':''))+(isToday?'today':'');
    let mini='';
    if(dayEntries.length>0){
      const nmList=dayEntries.slice(0,2).map(function(e){const m=members.find(function(x){return x.id===e.account_id;});return m?m.name:'';}).join('、');
      mini='<div class="mini">'+escHtml(nmList)+(dayEntries.length>2?' +'+(dayEntries.length-2):'')+'</div>';
    }
    row+='<td><div class="cal-cell '+cls+'" onclick="dayDetail(\''+dstr+'\')"><span class="d">'+day+'</span>'+(dayEntries.length>0?'<span class="dot"></span>':'')+mini+'</div></td>';
    col++;
    if(col%7===0){row+='</tr>';html+=row;row='<tr>';}
  }
  if(col%7!==0){while(col%7!==0){row+='<td><div class="cal-cell empty"></div></td>';col++;}row+='</tr>';html+=row;}
  html+='</tbody></table>';
  const monthDays=entries.length;
  let totalAmount=0;
  entries.forEach(function(e){const s=sites.find(function(x){return x.id===e.site_id;});if(s){totalAmount+=(s.price||0)*(e.work_type==='half'?0.5:1);}});
  html+='<div class="stat-row">';
  html+='<div class="stat-card"><div class="lbl">今月の出勤日数</div><div class="val">'+monthDays+' 日</div></div>';
  if(canSeeRevenue()){html+='<div class="stat-card"><div class="lbl">売上見込</div><div class="val">¥'+totalAmount.toLocaleString()+'</div></div>';}
  html+='</div>';
  document.getElementById('tab1').innerHTML=html;
}
function dayDetail(dstr){
  selectedDate=dstr;
  const dayEntries=entries.filter(function(e){return e.work_date===dstr;});
  document.getElementById('ddTitle').textContent=dstr+' の出勤記録';
  let body='';
  if(dayEntries.length===0){body='<div class="empty">記録なし</div>';}
  else{
    body='<table><thead><tr><th>メンバー</th><th>現場</th><th>区分</th><th>備考</th><th>操作</th></tr></thead><tbody>';
    dayEntries.forEach(function(e){
      const mb=members.find(function(x){return x.id===e.account_id;});
      const st=sites.find(function(x){return x.id===e.site_id;});
      const cc=st?clientCompanies.find(function(x){return x.id===st.client_company_id;}):null;
      body+='<tr><td>'+escHtml(mb?mb.name:'-')+'</td>';
      body+='<td>'+escHtml(cc?cc.name:'')+' '+escHtml(st?st.name:'-')+'</td>';
      body+='<td><span class="badge '+(e.work_type==='half'?'badge-half':'badge-full')+'">'+(e.work_type==='half'?'半日':'1日')+'</span></td>';
      body+='<td>'+escHtml(e.note||'')+'</td>';
      body+='<td><button class="btn btn-sm btn-secondary" onclick="editE(\''+e.id+'\')">編集</button> <button class="btn btn-sm btn-danger" onclick="delE(\''+e.id+'\')">削除</button></td></tr>';
    });
    body+='</tbody></table>';
  }
  document.getElementById('ddBody').innerHTML=body;
  document.getElementById('dayDetailModal').classList.add('show');
}
function buildMemberOpts(selId){var s='<option value="">-- 選択 --</option>';members.forEach(function(m){s+='<option value="'+m.id+'"'+(m.id===selId?' selected':'')+'>'+escHtml(m.name)+'</option>';});return s;}
function buildClientOpts(selId){var s='<option value="">-- 選択 --</option>';clientCompanies.forEach(function(c){s+='<option value="'+c.id+'"'+(c.id===selId?' selected':'')+'>'+escHtml(c.name)+'</option>';});return s;}
// 型セーフ化: HTML select の .value は常に string を返すが、
// DB の client_company_id / id が bigint 型（数値）だと厳密比較 === で一致しなくなる。
// 両辺を String() に寄せて比較する。
function buildSiteOpts(clientId,selId){
  var cid=(clientId==null||clientId==='')?'':String(clientId);
  var sid=(selId==null||selId==='')?'':String(selId);
  var s='<option value="">-- 選択 --</option>';
  sites.filter(function(x){
    if(!cid)return true;
    return String(x.client_company_id)===cid;
  }).forEach(function(st){
    s+='<option value="'+escHtml(st.id)+'"'+(String(st.id)===sid?' selected':'')+'>'+escHtml(st.name)+'</option>';
  });
  return s;
}
function showAddE(){
  clModal();
  document.getElementById('aeDate').value=selectedDate||localDateStr(new Date());
  document.getElementById('aeMember').innerHTML=buildMemberOpts(currentUser?currentUser.id:null);
  document.getElementById('aeClient').innerHTML=buildClientOpts();
  document.getElementById('aeSite').innerHTML=buildSiteOpts();
  document.getElementById('aeType').value='full';
  document.getElementById('aeNote').value='';
  document.getElementById('addEntryModal').classList.add('show');
}
function filterSitesByClient(){var cid=document.getElementById('aeClient').value;document.getElementById('aeSite').innerHTML=buildSiteOpts(cid);}
function filterEditSites(){var cid=document.getElementById('eeClient').value;document.getElementById('eeSite').innerHTML=buildSiteOpts(cid);}
async function saveEntry(){
  const payload={
    company_id:company.id,
    work_date:document.getElementById('aeDate').value,
    account_id:document.getElementById('aeMember').value||currentUser.id,
    site_id:document.getElementById('aeSite').value||null,
    work_type:document.getElementById('aeType').value,
    note:document.getElementById('aeNote').value
  };
  if(!payload.work_date){showToast('日付を入力してください');return;}
  const r=await sbPost('attendance',payload);
  if(r){showToast('保存しました');clModal();await ldMo();renderCalendar();}
  else{showToast('保存失敗');}
}
function editE(id){
  const e=entries.find(function(x){return x.id===id;});if(!e)return;
  const st=sites.find(function(x){return x.id===e.site_id;});
  clModal();
  document.getElementById('eeId').value=e.id;
  document.getElementById('eeDate').value=e.work_date;
  document.getElementById('eeMember').innerHTML=buildMemberOpts(e.account_id);
  document.getElementById('eeClient').innerHTML=buildClientOpts(st?st.client_company_id:null);
  document.getElementById('eeSite').innerHTML=buildSiteOpts(st?st.client_company_id:null,e.site_id);
  document.getElementById('eeType').value=e.work_type||'full';
  document.getElementById('eeNote').value=e.note||'';
  document.getElementById('editEntryModal').classList.add('show');
}
async function updateEntry(){
  const id=document.getElementById('eeId').value;
  const payload={
    work_date:document.getElementById('eeDate').value,
    account_id:document.getElementById('eeMember').value,
    site_id:document.getElementById('eeSite').value||null,
    work_type:document.getElementById('eeType').value,
    note:document.getElementById('eeNote').value
  };
  const r=await sbPatch('attendance','id=eq.'+id,payload);
  if(r){showToast('更新しました');clModal();await ldMo();renderCalendar();}
  else{showToast('更新失敗');}
}
async function delE(id){
  if(!confirm('この記録を削除しますか？'))return;
  const r=await sbDelete('attendance','id=eq.'+id);
  if(r){showToast('削除しました');clModal();await ldMo();renderCalendar();}
  else{showToast('削除失敗');}
}

// ============================================================
// Tab 2: Summary
// ============================================================
function prevSummaryMonth(){summaryMonthNum--;if(summaryMonthNum<1){summaryMonthNum=12;summaryYear--;}renderSummary();}
function nextSummaryMonth(){summaryMonthNum++;if(summaryMonthNum>12){summaryMonthNum=1;summaryYear++;}renderSummary();}
async function renderSummary(){
  const y=summaryYear, m=summaryMonthNum;
  const start=y+'-'+String(m).padStart(2,'0')+'-01';
  const endDate=new Date(y,m,0);
  const end=localDateStr(endDate);

  Object.values(agg).forEach(function(a){
    const st=sites.find(function(x){return x.id===a.site_id;});
    const cc=st?clientCompanies.find(function(x){return x.id===st.client_company_id;}):null;
    html+='<tr><td>'+escHtml(st?st.name:'(未設定)')+'</td><td>'+escHtml(cc?cc.name:'-')+'</td>';
    html+='<td style="text-align:right">'+a.days+'</td>';
    html+='<td style="text-align:right">¥'+(st?(st.price||0):0).toLocaleString()+'</td>';
    html+='<td style="text-align:right">¥'+a.amount.toLocaleString()+'</td></tr>';
  });
  if(Object.keys(agg).length===0)html+='<tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:30px">該当月の出勤記録はありません</td></tr>';
  html+='</tbody>';
  html+='<tfoot><tr style="font-weight:700;background:#f3f4f6"><td colspan="2">合計</td><td style="text-align:right">'+totalDays+'</td><td></td><td style="text-align:right">¥'+totalAmt.toLocaleString()+'</td></tr></tfoot>';
  html+='</table>';
  document.getElementById('tab2').innerHTML=html;
}

// 当月 attendance を取得し、社員名/現場/取引先を解決してから構造化データで渡す。
async function onClickKoujiNippoPdf(y,m){
  try{
    if(!window.ReportFeature||typeof window.ReportFeature.generateKoujiNippo!=='function'){
      showToast('report-feature.js 未読込');return;
    }
    const start=y+'-'+String(m).padStart(2,'0')+'-01';
    const end=localDateStr(new Date(y,m,0));
    let aq='company_id=eq.'+company.id+'&work_date=gte.'+start+'&work_date=lte.'+end+'&order=work_date.asc';
    if(isWorker())aq+='&account_id=eq.'+currentUser.id;
    const list=await sbGet('attendance',aq);
    const entries=(list||[]).map(function(a){
      const mb=members.find(function(x){return x.id===a.account_id;});
      const st=sites.find(function(x){return x.id===a.site_id;});
      const cc=st?clientCompanies.find(function(x){return x.id===st.client_company_id;}):null;
      // DBに time_slot が無いため、half は当面 am 固定で渡す（将来 time_slot 追加時は a.time_slot を採用）
      const ts=a.time_slot||(a.work_type==='half'?'am':'full');
      return{
        work_date:a.work_date,
        member_name:mb?mb.name:'',
        site_name:st?st.name:'',
        client_name:cc?cc.name:'',
        work_type:a.work_type||'full',
        time_slot:ts,
        note:a.note||''
      };
    });
    window.ReportFeature.generateKoujiNippo({
      year:y,
      month:m,
      companyName:(company&&company.name)||'',
      ownerName:(currentUser&&currentUser.name)||'',
      entries:entries
    });
  }catch(e){
    console.error(e);
    showToast('工事日報PDF生成失敗: '+(e&&e.message?e.message:e));
  }
}

// =========================================================
// カレンダー自動反映（Step 3-d）
//   選択取引先に紐づく work_sites の当月 attendance を集計し、
//   明細行に追加する。請負タイプは 1式×site.price、それ以外は
//   日数×単価の1行。既存明細には "追加" する（置換はしない）。
// =========================================================
async function fillInvoiceFromCalendar(){
  try{
    const cid=document.getElementById('invCalClient').value;
    const mStr=document.getElementById('invCalMonth').value;
    if(!cid){showToast('取引先を選択してください');return;}
    if(!mStr||!/^\d{4}-\d{2}$/.test(mStr)){showToast('対象月を選択してください');return;}
    const parts=mStr.split('-');
    const y=parseInt(parts[0],10),m=parseInt(parts[1],10);
    const start=mStr+'-01';
    const end=localDateStr(new Date(y,m,0));
    // 型セーフ比較: select.value は常に string、DB の id/client_company_id は bigint だと
    // === で失敗する。buildSiteOpts と同じ方針で String() に寄せる。
    const cidStr=String(cid);
    const clientSites=sites.filter(function(s){return String(s.client_company_id)===cidStr;});
    if(clientSites.length===0){showToast('この取引先に紐づく現場がありません');return;}
    const siteIds=clientSites.map(function(s){return s.id;});
    let filter='company_id=eq.'+company.id+'&work_date=gte.'+start+'&work_date=lte.'+end+'&site_id=in.('+siteIds.join(',')+')';
    if(isWorker())filter+='&account_id=eq.'+currentUser.id;
    const list=await sbGet('attendance',filter)||[];
    // site_idごとに日数を集計（full=1, half=0.5）。key を String で正規化
    const agg={};
    list.forEach(function(e){
      const k=String(e.site_id);
      agg[k]=(agg[k]||0)+(e.work_type==='half'?0.5:1);
    });
    // 明細行生成：請負=1式×単価、それ以外=日数×単価
    // 仕様欄はカレンダー取り込み時は空欄（社長指定、Step5）
    const specLabel=y+'年'+m+'月分';  // ← 件名(subject)の自動補完には使うが、明細の spec には入れない
    const newRows=[];
    clientSites.forEach(function(s){
      const days=agg[String(s.id)]||0;
      if(days<=0)return;
      if(s.type==='請負'){
        newRows.push({name:s.name||'',spec:'',qty:1,unit:'式',price:parseInt(s.price)||0});
      }else{
        newRows.push({name:s.name||'',spec:'',qty:days,unit:'人',price:parseInt(s.price)||0});
      }
    });
    if(newRows.length===0){showToast('該当月の出勤データがありません');return;}
    // 空行1件だけ残っている初期状態なら捨ててから追加
    if(invRows.length===1){
      const r0=invRows[0];
      if(!r0.name&&!r0.spec&&(!r0.price||r0.price===0)){
        invRows=[];
      }
    }
    invRows=invRows.concat(newRows);
    // 宛先・件名の自動補完（空欄時のみ）— ここも型セーフ比較
    const cc=clientCompanies.find(function(x){return String(x.id)===cidStr;});
    const invToEl=document.getElementById('invTo');
    if(invToEl&&cc&&!invToEl.value)invToEl.value=cc.name;
    const subjEl=document.getElementById('invSiteName');
    if(subjEl&&!subjEl.value)subjEl.value=specLabel;
    renderInvForm();
    renderInvoicePreview();
    showToast(newRows.length+'件の明細を追加しました');
  }catch(e){
    console.error(e);
    showToast('取り込み失敗: '+(e&&e.message?e.message:e));
  }
}

const INV_UNITS=['人','式','m','m²','m³','個','本','枚','kg','t'];
function buildUnitOptions(cur){
  let opts='';let matched=false;
  INV_UNITS.forEach(function(u){
    const sel=(u===cur)?' selected':'';
    if(sel)matched=true;
    opts+='<option value="'+escHtml(u)+'"'+sel+'>'+escHtml(u)+'</option>';
  });
  if(cur&&!matched){
    // 既存データ（例: '人工' 等）を保持するための先頭オプション
    opts='<option value="'+escHtml(cur)+'" selected>'+escHtml(cur)+'</option>'+opts;
  }
  return opts;
}

// プレビューは ReportFeature._internals.buildInvoiceHtml を使って PDF と完全一致させる
function renderInvoicePreview(){
  const RF=window.ReportFeature;
  if(!RF||!RF._internals||!RF._internals.buildInvoiceHtml||!RF._internals.ensureInvoiceStyles){
    // まだ読み込まれていない場合は何もしない（openInvoice 再実行で再描画される）
    return;
  }
  RF._internals.ensureInvoiceStyles();
  const params=gatherInvoiceParams();
  let subtotal=0;
  (params.rows||[]).forEach(function(r){subtotal+=(Number(r.qty)||0)*(Number(r.price)||0);});
  const taxRate=(typeof params.taxRate==='number')?params.taxRate:0.10;
  const tax=Math.floor(subtotal*taxRate);
  const total=subtotal+tax;
  document.getElementById('invoice-print-area').innerHTML=RF._internals.buildInvoiceHtml(params,subtotal,tax,total);
}

async function openReceiptForm(){
  if(!window.ReportFeature||typeof window.ReportFeature.generateReceiptPdf!=='function'){
    showToast('report-feature.js 未読込');return;
  }
  // 報告書スタイルをプレビュー側にも注入
  if(window.ReportFeature._internals&&window.ReportFeature._internals.ensureReceiptStyles){
    window.ReportFeature._internals.ensureReceiptStyles();
  }
  const today=new Date();
  const ymd=localDateStr(today);
  const ym=today.getFullYear()+String(today.getMonth()+1).padStart(2,'0');
  const prefix='R-'+ym+'-';
  // 取引先セレクト
  const clientSel=document.getElementById('rcClient');
  clientSel.innerHTML=buildClientOpts();
  // 既定値
  document.getElementById('rcDate').value=ymd;
  document.getElementById('rcIssuer').value=(company&&company.name)||'';
  document.getElementById('rcTotal').value='';
  document.getElementById('rcDesc').value='工事代金として';
  document.getElementById('rcTaxRate').value='0.10';
  // インボイス登録番号は company に保存されていれば流用（未使用なら空）
  const curReg=document.getElementById('rcRegNo');
  if(!curReg.value)curReg.value=(company&&company.registration_no)||'';
  // 領収書Noを採番（同月・同社の最大+1）
  document.getElementById('rcNo').value=prefix+'001';
  try{
    const rows=await sbGet('receipts','company_id=eq.'+company.id+'&receipt_no=like.'+encodeURIComponent(prefix+'*')+'&order=receipt_no.desc&limit=1');
    if(Array.isArray(rows)&&rows.length){
      const last=rows[0].receipt_no||'';
      const num=parseInt(last.split('-').pop(),10)||0;
      document.getElementById('rcNo').value=prefix+String(num+1).padStart(3,'0');
    }
  }catch(e){/* 採番できなくてもフォームは開く */console.warn('receipt numbering:',e);}
  // プレビュー/計算欄の初期表示
  refreshReceiptPreview();
  // 入力変更時に自動リフレッシュ
  ['rcTotal','rcTaxRate','rcDesc','rcClient','rcDate','rcRegNo','rcNo'].forEach(function(id){
    const el=document.getElementById(id);if(el)el[el.tagName==='SELECT'?'onchange':'oninput']=refreshReceiptPreview;
  });
  document.getElementById('receiptOverlay').classList.add('show');
}

function gatherReceiptParams(){
  const clientSel=document.getElementById('rcClient');
  const clientText=clientSel&&clientSel.options[clientSel.selectedIndex]?clientSel.options[clientSel.selectedIndex].text:'';
  return{
    receiptNo:document.getElementById('rcNo').value,
    issueDate:document.getElementById('rcDate').value,
    issuer:document.getElementById('rcIssuer').value,
    clientCompany:clientText==='-- 選択 --'?'':clientText,
    total:parseInt(document.getElementById('rcTotal').value)||0,
    taxRate:parseFloat(document.getElementById('rcTaxRate').value)||0.10,
    description:document.getElementById('rcDesc').value,
    registrationNo:document.getElementById('rcRegNo').value
  };
}

function refreshReceiptPreview(){
  const params=gatherReceiptParams();
  const RF=window.ReportFeature;
  if(!RF||!RF._internals||!RF._internals.calcReceiptBreakdown||!RF._internals.buildReceiptHtml)return;
  const b=RF._internals.calcReceiptBreakdown(params.total,params.taxRate);
  b.total=params.total;
  // プレビュー領域に描画
  const page=document.getElementById('receiptPage');
  if(page)page.innerHTML=RF._internals.buildReceiptHtml(params,b);
  // 計算欄
  const calc=document.getElementById('rcCalc');
  if(calc){
    calc.innerHTML='税抜: ¥'+b.excl.toLocaleString()+
      '　／　消費税: ¥'+b.tax.toLocaleString()+
      '　／　合計: <b>¥'+params.total.toLocaleString()+'</b>'+
      (b.stamp?'　<span style="color:#f59e0b">※収入印紙欄あり</span>':'');
  }
}

function onClickReceiptPdf(){
  try{
    if(!window.ReportFeature||typeof window.ReportFeature.generateReceiptPdf!=='function'){
      showToast('report-feature.js 未読込');return;
    }
    const params=gatherReceiptParams();
    if(!params.total){showToast('金額を入力してください');return;}
    window.ReportFeature.generateReceiptPdf(params);
  }catch(e){
    console.error(e);
    showToast('領収書PDF生成失敗: '+(e&&e.message?e.message:e));
  }
}

async function saveReceipt(){
  try{
    const clientSel=document.getElementById('rcClient');
    const cid=clientSel.value;
    if(!cid){showToast('宛先会社を選択してください');return;}
    const total=parseInt(document.getElementById('rcTotal').value)||0;
    if(!total){showToast('金額を入力してください');return;}
    const taxRate=parseFloat(document.getElementById('rcTaxRate').value)||0.10;
    const excl=Math.round(total/(1+taxRate));
    const tax=Math.round(total-excl);
    const payload={
      company_id:company.id,
      client_company_id:cid,
      receipt_no:document.getElementById('rcNo').value,
      issue_date:document.getElementById('rcDate').value||null,
      total_amount:total,
      tax_rate:taxRate,
      tax_excluded:excl,
      tax_amount:tax,
      description:document.getElementById('rcDesc').value||null,
      registration_no:document.getElementById('rcRegNo').value||null
    };
    const r=await sbPost('receipts',payload);
    if(r){showToast('領収書を保存しました');}
    else{showToast('保存に失敗しました');}
  }catch(e){
    console.error(e);
    showToast('保存エラー: '+(e&&e.message?e.message:e));
  }
}

async function changeUserPassword(){
  const newPw=document.getElementById('stNewPw').value;
  if(!newPw||newPw.length<4){showToast('パスワードは4文字以上');return;}
  try{
    const{error}=await sb.auth.updateUser({password:newPw});
    if(error){showToast('変更失敗: '+error.message);return;}
    showToast('パスワード変更完了');document.getElementById('stNewPw').value='';
  }catch(e){showToast('エラー: '+e.message);}
}
async function updateCompany(){
  const nm=document.getElementById('stCoName').value.trim();
  if(!nm){showToast('会社名を入力してください');return;}
  const r=await sbPatch('companies','id=eq.'+company.id,{name:nm});
  if(r){company.name=nm;document.getElementById('sbCompany').textContent=nm;showToast('保存しました');}
  else{showToast('保存失敗');}
}
async function createNewAccount(){
  const name=document.getElementById('stNewName').value.trim();
  const role=document.getElementById('stNewRole').value;
  const team=document.getElementById('stNewTeam').value.trim();
  const pw=document.getElementById('stNewPw2').value;
  if(!name||!pw){showToast('名前とパスワードは必須');return;}
  if(pw.length<4){showToast('パスワードは4文字以上で入力してください');return;}
  try{
    const tempEmail=crypto.randomUUID()+'@nichilog.app';
    const{data:authData,error:signUpErr}=await sb.auth.signUp({email:tempEmail,password:pw});
    if(signUpErr){showToast('登録失敗: '+signUpErr.message);return;}
    const{error:regErr}=await sb.rpc('complete_registration',{p_company:company.name,p_name:name,p_role:role,p_team:team});
    if(regErr){showToast('登録エラー: '+regErr.message);return;}
    showToast('追加しました');document.getElementById('stNewName').value='';document.getElementById('stNewTeam').value='';document.getElementById('stNewPw2').value='';
    await renderAll();
  }catch(e){showToast('エラー: '+e.message);}
}

function openWithSession(page){
  sb.auth.getSession().then(function(result){
    var session=result.data.session;
    var base='https://nichilog.vercel.app/nichilog-pc.html';
    var fragment='';
    if(session){fragment='#access_token='+session.access_token+'&refresh_token='+session.refresh_token+'&token_type=bearer';}
    var pageParam=page?'&page='+page:'';
    var url=base+fragment+pageParam;
    if(window.flutter_inappwebview){window.flutter_inappwebview.callHandler('openExternal',url);}
    else{window.open(url,'_blank');}
  });
}

// ============================================================
// Session restore on page load (copied pattern from existing pc.html)
// ============================================================
(async function restoreSession(){
  const _h=new URLSearchParams(window.location.hash.slice(1));
  const _at=_h.get('access_token');
  const _rt=_h.get('refresh_token');
  if(_at&&_rt){
    try{await sb.auth.setSession({access_token:_at,refresh_token:_rt});}catch(e){}
    history.replaceState(null,'',window.location.pathname);
  }
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(session&&session.user){
      const accs=await sbGet('accounts','auth_uid=eq.'+session.user.id);
      if(accs&&accs.length>0){
        currentUser=accs[0];
        const comps=await sbGet('companies','id=eq.'+currentUser.company_id);
        if(comps&&comps.length>0){
          company=comps[0];
          await enterApp();
          return;
        }
      }
    }
  }catch(e){console.error('Session restore failed',e);}
})();
