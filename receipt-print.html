<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>領収書</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ========== 画面表示（操作用） ========== */
  html,body{margin:0;padding:0;background:#f3f4f6;font-family:"Hiragino Sans","Yu Gothic","Helvetica Neue",sans-serif;color:#222}
  .print-controls{position:sticky;top:0;background:#1f2937;color:#fff;padding:10px 16px;display:flex;gap:10px;align-items:center;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.15)}
  .print-controls button{background:#2563EB;color:#fff;border:none;padding:8px 22px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600}
  .print-controls button:hover{background:#1d4ed8}
  .print-controls .hint{color:#cbd5e1;font-size:12px;margin-left:auto}
  .container{max-width:960px;margin:20px auto;padding:0 12px}
  .state{text-align:center;padding:60px 20px;font-size:16px;color:#374151;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .state.error{color:#dc2626}

  /* ========== 領収書 用紙（A4・見本画像 IMG_2839 準拠） ========== */
  .rf-receipt-page{
    background:#fff;color:#222;
    width:210mm;min-height:297mm;
    margin:0 auto;
    padding:14mm 14mm;
    box-sizing:border-box;
    border:1px solid #000;
    font-family:"Hiragino Sans","Yu Gothic","Helvetica Neue",sans-serif;
    font-size:10pt;
    box-shadow:0 1px 6px rgba(0,0,0,.15);
    position:relative;
  }

  /* ヘッダ: 紺色タイトル帯 + 日付 */
  .rf-rc-top{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:10mm;
  }
  .rf-rc-title{
    background:#2563EB;color:#fff;
    font-weight:600;
    font-size:22pt;letter-spacing:12px;
    padding:4mm 8mm;
    width:58%;box-sizing:border-box;
    text-align:center;
  }
  .rf-rc-date{
    font-size:11pt;
  }

  /* 宛先: 中央・下線 */
  .rf-rc-to{
    text-align:center;
    font-size:14pt;
    padding:2mm 0 4mm;
    border-bottom:1px solid #222;
    margin:0 10mm 4mm;
    min-height:8mm;
  }

  /* 金額行: 中央の大きな金額 + 右の印紙枠 */
  .rf-rc-amt-row{
    display:flex;align-items:stretch;gap:6mm;
    margin:2mm 0 5mm;
  }
  .rf-rc-amt-inner{
    flex:1;
    text-align:center;
    padding:4mm 0 5mm;
    border-bottom:1px solid #222;
    display:flex;align-items:center;justify-content:center;
  }
  .rf-rc-amt-val{
    font-size:32pt;
    font-weight:700;
    letter-spacing:2px;
  }
  .rf-rc-stamp{
    width:28mm;
    display:flex;align-items:center;justify-content:center;
  }
  .rf-rc-stamp-frame{
    width:22mm;height:22mm;
    border:1px dashed #666;
    display:flex;align-items:center;justify-content:center;
    font-size:10pt;color:#444;
    text-align:center;line-height:1.5;
  }

  /* 但し書き */
  .rf-rc-desc{
    font-size:11pt;
    padding:2mm 0 8mm;
  }

  /* 下部: 内訳 + 発行元 */
  .rf-rc-body{
    display:flex;gap:10mm;
    margin-top:2mm;
    align-items:flex-start;
  }
  .rf-rc-break{
    flex:1;
  }
  .rf-rc-break-hdr{
    font-size:11pt;
    border-bottom:1px solid #222;
    padding-bottom:2mm;
    margin-bottom:2mm;
    width:80%;
  }
  .rf-rc-tbl{
    width:100%;border-collapse:collapse;
  }
  .rf-rc-tbl td{
    padding:2mm 3mm;
    font-size:10pt;
    vertical-align:middle;
    border:none;
  }
  .rf-rc-tbl td.l{width:22mm}
  .rf-rc-tbl td.m{text-align:left;font-size:10pt}
  .rf-rc-tbl td.r{text-align:right;width:30mm}
  .rf-rc-tbl tr.sub td{color:#444;font-size:9pt;padding:1.2mm 3mm}
  .rf-rc-tbl tr.sub td.m{padding-left:18mm}

  .rf-rc-issuer{
    width:60mm;
    padding-top:14mm;
    font-size:11pt;
    line-height:1.6;
    text-align:left;
  }
  .rf-rc-issuer .iss{font-weight:500;letter-spacing:0.5px}

  /* ========== 印刷時（A4縦・余白0） ========== */
  @page{size:A4 portrait;margin:0}
  @media print{
    html,body{background:#fff;margin:0;padding:0}
    .print-controls{display:none !important}
    .container{max-width:none;margin:0;padding:0}
    .rf-receipt-page{width:210mm;min-height:297mm;margin:0;box-shadow:none;page-break-after:always}
  }
</style>
</head>
<body>

<div class="print-controls">
  <button onclick="window.print()">🖨 印刷 / PDFとして保存</button>
  <span class="hint">印刷ダイアログで「PDFとして保存」を選ぶと、好きな場所にPDF保存できます。</span>
</div>

<div class="container">
  <div id="content">
    <div class="state">読み込み中...</div>
  </div>
</div>

<script>
// Supabase 接続（nichilog-pc.html と同じ storageKey でセッション共有）
function _d(s){return atob(s).split('').reverse().join('');}
const SB=_d('b2MuZXNhYmFwdXMueWVpdnljc21pcHl3cnh1c3RtamgvLzpzcHR0aA==');
const SK=_d('Z3lIR1JrcVp0Wk5IWnZUSHpkeFVDcFRPYlp2d0VmeXRzX2RnSVFMdnhSSS4wWE8xY1RPNFVUTzRBak02SUNjNFZtSXNrVE4zTVRNd1F6TjNFak9pUVhZcEpDTGk0MmJ1Rm1JNklTWnM5bWNpd2lJNVZXYTJsM1l6MVdhd2wzZHloWGR6UlhicWhtSTZJaVpsSm5Jc0lTWnpGbVloQlhkekppT2lNM2NwSnllLjlKQ1ZYcGtJNklDYzVSbklzSWlOMUl6VUlKaU9pY0diaEp5ZQ==');
const sb=window.supabase.createClient(SB,SK,{auth:{persistSession:true,storageKey:'nichilog-auth'}});

function escHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function yenFmt(n){return '¥'+Math.round(Number(n)||0).toLocaleString();}
function yenFmtDash(n){return yenFmt(n)+'-';}
function fmtDate(iso){
  if(!iso)return '';
  try{
    var d=new Date(iso+'T00:00:00');
    if(isNaN(d.getTime()))return String(iso);
    var y=d.getFullYear();
    var m=String(d.getMonth()+1).padStart(2,'0');
    var dd=String(d.getDate()).padStart(2,'0');
    return y+'/'+m+'/'+dd;
  }catch(_){return String(iso);}
}

// 内訳計算 (report-feature.js の calcReceiptBreakdown と同じ)
function calcReceiptBreakdown(total,taxRate){
  var t=Math.round(Number(total)||0);
  var rate=Number(taxRate)||0.10;
  var excl=Math.round(t/(1+rate));
  var tax=t-excl;
  var tax8=(Math.abs(rate-0.08)<1e-6)?tax:0;
  var tax10=(Math.abs(rate-0.10)<1e-6)?tax:0;
  var stamp=t>=50000;
  return{total:t,excl:excl,tax:tax,tax8:tax8,tax10:tax10,stamp:stamp};
}

// 領収書HTML組み立て（IMG_2839 準拠レイアウト）
function buildReceiptHtml(p,b){
  var dateStr=fmtDate(p.issueDate);
  var toLine=p.clientCompany?escHtml(p.clientCompany)+'　御中':'';
  var stampHtml=b.stamp
    ? '<div class="rf-rc-stamp-frame">収入<br>印紙</div>'
    : '';
  var desc=p.description||'工事代金として';
  var issuerLine=[p.issuer||'',p.registrationNo||''].filter(Boolean).join('　');
  return ''+
    '<div class="rf-receipt-page">'+
      '<div class="rf-rc-top">'+
        '<div class="rf-rc-title">領　収　書</div>'+
        '<div class="rf-rc-date">'+escHtml(dateStr)+'</div>'+
      '</div>'+
      '<div class="rf-rc-to">'+toLine+'</div>'+
      '<div class="rf-rc-amt-row">'+
        '<div class="rf-rc-amt-inner">'+
          '<div class="rf-rc-amt-val">'+yenFmtDash(b.total||0)+'</div>'+
        '</div>'+
        '<div class="rf-rc-stamp">'+stampHtml+'</div>'+
      '</div>'+
      '<div class="rf-rc-desc">但　'+escHtml(desc)+'　上記正に領収いたしました。</div>'+
      '<div class="rf-rc-body">'+
        '<div class="rf-rc-break">'+
          '<div class="rf-rc-break-hdr">内訳</div>'+
          '<table class="rf-rc-tbl">'+
            '<tr><td class="l">小計</td><td class="m">①</td><td class="r">'+yenFmtDash(b.excl)+'</td></tr>'+
            '<tr><td class="l">消費税等</td><td class="m">②（❹＋❺）</td><td class="r">'+yenFmtDash(b.tax)+'</td></tr>'+
            '<tr><td class="l">合計</td><td class="m">③（①＋②）</td><td class="r">'+yenFmtDash(b.total)+'</td></tr>'+
            '<tr class="sub"><td class="l"></td><td class="m">(8%)消費税合計　❹</td><td class="r">'+yenFmtDash(b.tax8)+'</td></tr>'+
            '<tr class="sub"><td class="l"></td><td class="m">(10%)消費税合計　❺</td><td class="r">'+yenFmtDash(b.tax10)+'</td></tr>'+
          '</table>'+
        '</div>'+
        '<div class="rf-rc-issuer">'+
          '<div class="iss">'+escHtml(issuerLine)+'</div>'+
        '</div>'+
      '</div>'+
    '</div>';
}

function showState(text,isError){
  const el=document.getElementById('content');
  el.innerHTML='<div class="state'+(isError?' error':'')+'">'+escHtml(text)+'</div>';
}

async function load(){
  const params=new URLSearchParams(location.search);
  const id=params.get('id');
  if(!id){
    showState('IDが指定されていません（?id=xxx を URL に付けてください）',true);
    return;
  }
  try{
    // 1) receipt 本体
    const{data:rc,error:rcErr}=await sb.from('receipts').select('*').eq('id',id).single();
    if(rcErr||!rc){
      showState('データが見つかりません',true);
      console.error(rcErr);
      return;
    }
    // 2) 宛先会社名
    let clientCompany='';
    if(rc.client_company_id){
      try{
        const{data:cc}=await sb.from('client_companies').select('name').eq('id',rc.client_company_id).single();
        if(cc)clientCompany=cc.name||'';
      }catch(e){console.warn('client_companies lookup:',e);}
    }
    // 3) 発行元会社名 + インボイス登録番号
    let issuer='';
    let regNo=rc.registration_no||'';
    if(rc.company_id){
      try{
        const{data:co}=await sb.from('companies').select('name,registration_no').eq('id',rc.company_id).single();
        if(co){
          issuer=co.name||'';
          if(!regNo)regNo=co.registration_no||'';
        }
      }catch(e){console.warn('companies lookup:',e);}
    }
    // 4) buildReceiptHtml 入力を組み立て
    const p={
      receiptNo:rc.receipt_no||'',
      issueDate:rc.issue_date||'',
      issuer:issuer,
      clientCompany:clientCompany,
      total:Number(rc.total_amount)||0,
      taxRate:Number(rc.tax_rate)||0.10,
      description:rc.description||'工事代金として',
      registrationNo:regNo
    };
    const b=calcReceiptBreakdown(p.total,p.taxRate);
    // DB に保存済みの excl/tax を優先 (表示値のブレ回避)
    if(rc.tax_excluded!=null)b.excl=Number(rc.tax_excluded);
    if(rc.tax_amount!=null){
      b.tax=Number(rc.tax_amount);
      if(p.taxRate===0.08)b.tax8=b.tax;
      if(p.taxRate===0.10)b.tax10=b.tax;
    }
    b.total=p.total;
    document.getElementById('content').innerHTML=buildReceiptHtml(p,b);
    if(rc.receipt_no)document.title='領収書 '+rc.receipt_no;
  }catch(e){
    console.error(e);
    showState('読み込み失敗: '+(e&&e.message?e.message:e),true);
  }
}

load();
</script>

</body>
</html>
