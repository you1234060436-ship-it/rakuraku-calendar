<style>*{margin:0;padding:0;box-sizing:border-box}:root{--p:#1a73e8;--sf:#f8f9fa;--ol:#c4c7c5;--ct:#e8f0fe}body{font-family:'Noto Sans JP',sans-serif;background:#fff;overflow:hidden;height:100vh;display:flex;flex-direction:column}.ph{width:100%;max-width:420px;height:100vh;margin:0 auto;display:flex;flex-direction:column;background:#fff}.ab{background:var(--p);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;min-height:56px}.ab h1{font-size:18px;font-weight:500;flex:1}.ct{flex:1;overflow-y:auto;padding:16px;background:var(--sf)}.nb{display:flex;background:#fff;border-top:1px solid var(--ol);min-height:64px}.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#5f6368;padding:8px 0}.ni.a{color:var(--p)}.ni .ms{font-size:24px}.ni span:last-child{font-size:11px}.lb{background:linear-gradient(135deg,#1a73e8,#0d47a1);height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.lc{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.15)}.lc h2{text-align:center;font-size:24px;margin-bottom:8px;color:var(--p)}.lc p{text-align:center;color:#5f6368;font-size:13px;margin-bottom:24px}.ig{margin-bottom:16px}.ig label{display:block;font-size:12px;color:#5f6368;margin-bottom:4px}.ig input{width:100%;padding:12px;border:1px solid var(--ol);border-radius:8px;font-size:15px;font-family:inherit;outline:none}.ig input:focus{border-color:var(--p)}.btn{width:100%;padding:12px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}.btn:disabled{background:#a8c7fa}.em{color:#d93025;font-size:13px;text-align:center;margin-top:8px;display:none}.cd{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}.ct2{font-size:14px;font-weight:500;color:var(--p);margin-bottom:8px}.cr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px}.cr .l{color:#5f6368}.cr .v{font-weight:500}.sc{display:inline-block;background:var(--ct);color:var(--p);padding:4px 12px;border-radius:16px;font-size:12px;font-weight:500;margin:2px}.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}.cdn{font-size:11px;color:#5f6368;padding:4px}.cdd{padding:8px 4px;font-size:13px;border-radius:8px;cursor:pointer}.cdd:hover{background:var(--ct)}.cdd.t{background:var(--p);color:#fff;font-weight:700}.mi{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0}.ma{width:40px;height:40px;border-radius:50%;background:var(--ct);display:flex;align-items:center;justify-content:center;color:var(--p);font-weight:700;font-size:16px}.si{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f0f0f0}.si .sl{display:flex;align-items:center;gap:12px}.inv{background:#fff;padding:20px;border:1px solid #ddd}.ivt{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}.ivt th,.ivt td{border:1px solid #ccc;padding:6px 8px;text-align:left}.ivt th{background:#f5f5f5}.ivt .r{text-align:right}.stp{width:60px;height:60px;border:2px solid #d00;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#d00;font-size:11px;font-weight:700}.tc{display:none}.tc.a{display:block}.cdd.sel{background:var(--ct);color:var(--p);font-weight:700;border:2px solid var(--p)}.cdd .dot{width:5px;height:5px;background:var(--p);border-radius:50%;margin:2px auto 0}.cdd.t .dot{background:#fff}.day-item{display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border-radius:10px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}.day-item .avatar{width:36px;height:36px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}.day-item .info{flex:1}.day-item .info .sn{font-size:14px;font-weight:500}.day-item .info .mn{font-size:12px;color:#5f6368}.day-item .hrs{font-size:16px;font-weight:700;color:var(--p)}.add-btn{display:flex;align-items:center;justify-content:center;gap:4px;width:100%;padding:12px;border:2px dashed var(--ol);border-radius:10px;background:none;color:var(--p);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:8px}.add-btn:hover{background:var(--ct);border-color:var(--p)}.mbg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center}.mdl{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)}.mdl h3{font-size:18px;margin-bottom:16px;color:var(--p)}.mdl label{display:block;font-size:12px;color:#5f6368;margin-bottom:4px;margin-top:12px}.mdl select,.mdl input{width:100%;padding:10px;border:1px solid var(--ol);border-radius:8px;font-size:14px;font-family:inherit}.mda{display:flex;gap:8px;margin-top:20px}.mda button{flex:1;padding:10px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}.mda .mc{background:#f1f3f4;color:#5f6368}.mda .ms{background:var(--p);color:#fff}</style></head><body><div class="ph" id="app"><div id="ls" class="lb"><div class="lc"><h2>ニチログ</h2><p>日報・現場管理アプリ</p><div class="ig"><label>会社名</label><input type="text" id="ci" placeholder="例: みらい創業"></div><div class="ig"><label>パスワード</label><input type="password" id="pi" placeholder="パスワードを入力"></div><button class="btn" id="lb2" onclick="doLogin()">ログイン</button><div class="em" id="le"></div></div></div><div id="ms" style="display:none;height:100vh;flex-direction:column"><div class="ab"><span class="ms material-symbols-outlined">menu</span><h1 id="at">ニチログ</h1><span class="ms material-symbols-outlined">notifications</span></div><div class="ct" id="mc"><div id="t0" class="tc a"></div><div id="t1" class="tc"></div><div id="t2" class="tc"></div><div id="t3" class="tc"></div><div id="t4" class="tc"></div><div id="t5" class="tc"></div></div><div class="nb" id="nv"></div></div></div><script>
var SB='https://hjmtsuxrwypimscyviey.supabase.co/rest/v1';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqbXRzdXhyd3lwaW1zY3l2aWV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTM3NTksImV4cCI6MjA4OTU4OTc1OX0.IRxvLQIgd_styfEwvZbOTpCUxdzHTvZHNZtZqkRGHyg';
var H={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};
var company=null,account=null,sites=[],members=[],entries=[];
function sbGet(t,q){q=q||'';return fetch(SB+'/'+t+'?'+q,{headers:H}).then(function(r){return r.ok?r.json():[]});}
var navData=[['calendar_month','カレンダー'],['dashboard','サマリー'],['location_on','現場'],['group','メンバー'],['receipt_long','請求'],['settings','設定']];

function switchTab(idx){for(var i=0;i<6;i++){document.getElementById('t'+i).classList.toggle('a',i===idx);document.querySelectorAll('.ni')[i].classList.toggle('a',i===idx);}var iv=document.getElementById('invV');if(iv)iv.style.display='none';}
var selectedDate=new Date().toISOString().slice(0,10);var viewMonth=new Date();
async function sha256(s){var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('')}
async function doLogin(){var b=document.getElementById('lb2'),e=document.getElementById('le'),cn=document.getElementById('ci').value.trim(),pw=document.getElementById('pi').value.trim();e.style.display='none';if(!cn||!pw){e.textContent='会社名とパスワードを入力';e.style.display='block';return;}b.disabled=true;b.textContent='ログイン中...';sbGet('companies','name=eq.'+cn).then(function(cs){if(!cs.length)throw new Error('会社が見つかりません');company=cs[0];return sbGet('accounts','company_id=eq.'+company.id);}).then(async function(as){var _h=await sha256(pw);var m=as.find(function(a){return a.password===pw||a.password===_h;});if(!m)throw new Error('パスワードが正しくありません');account=m;var cid=company.id;return Promise.all([sbGet('work_sites','company_id=eq.'+cid+'&order=created_at.desc'),sbGet('accounts','company_id=eq.'+cid+'&order=name.asc'),sbGet('attendance_entries','company_id=eq.'+cid+'&order=date.desc&limit=100')]);}).then(function(r){sites=r[0];members=r[1];entries=r[2];document.getElementById('ls').style.display='none';document.getElementById('ms').style.display='flex';document.getElementById('at').textContent=company.name;renderAll();}).catch(function(ex){e.textContent=ex.message;e.style.display='block';}).finally(function(){b.disabled=false;b.textContent='ログイン';});}function renderAll(){renderCalendar();renderSummary();renderSites();renderMembers();renderReport();renderSettings();}
function renderCalendar(){var el=document.getElementById("t0");if(!el)return;var y=viewMonth.getFullYear(),m=viewMonth.getMonth();var first=new Date(y,m,1),last=new Date(y,m+1,0);var sd=first.getDay(),nd=last.getDate();var today=new Date().toISOString().slice(0,10);var dm={};entries.forEach(function(e){dm[e.date]=true});var h='<div class="cd"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';h+='<span class="material-symbols-outlined" style="cursor:pointer" onclick="chMo(-1)">chevron_left</span>';h+='<b style="font-size:16px">'+y+"\u5E74"+(m+1)+'\u6708</b>';h+='<span class="material-symbols-outlined" style="cursor:pointer" onclick="chMo(1)">chevron_right</span></div>';h+='<div class="cg"><div class="cdn" style="color:#d93025">\u65E5</div><div class="cdn">\u6708</div><div class="cdn">\u706B</div><div class="cdn">\u6C34</div><div class="cdn">\u6728</div><div class="cdn">\u91D1</div><div class="cdn" style="color:#1a73e8">\u571F</div>';for(var i=0;i<sd;i++)h+="<div></div>";for(var d=1;d<=nd;d++){var ds=y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");var cls="cdd";if(ds===today)cls+=" t";if(ds===selectedDate)cls+=" sel";var dot=dm[ds]?'<div class="dot"></div>':"";h+='<div class="'+cls+'" onclick="selD(\x27'+ds+'\x27)">'+d+dot+"</div>";}h+="</div></div>";h+=dayDetail();el.innerHTML=h;}
function selD(ds){selectedDate=ds;renderCalendar()}
function chMo(delta){viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+delta,1);ldMo().then(function(){renderCalendar()})}
function ldMo(){var y=viewMonth.getFullYear(),m=viewMonth.getMonth();var s=y+"-"+String(m+1).padStart(2,"0")+"-01";var e=y+"-"+String(m+1).padStart(2,"0")+"-"+new Date(y,m+1,0).getDate();return fetch(SB+"/attendance_entries?company_id=eq."+company.id+"&date=gte."+s+"&date=lte."+e+"&order=date.desc",{headers:H}).then(function(r){return r.json()}).then(function(d){entries=d})}
function gSN(sid){var s=sites.find(function(x){return x.id==sid});return s?s.name:"\u4E0D\u660E"}
function gMN(mid){var m=members.find(function(x){return x.id==mid});return m?m.name:"\u4E0D\u660E"}
function dayDetail(){var de=entries.filter(function(e){return e.date===selectedDate});var p=selectedDate.split("-");var dt=new Date(p[0],p[1]-1,p[2]);var wd=["\u65E5","\u6708","\u706B","\u6C34","\u6728","\u91D1","\u571F"];var lb=(dt.getMonth()+1)+"/"+dt.getDate()+" ("+wd[dt.getDay()]+")";var h='<div style="display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px"><b>'+lb+'</b><span style="color:#5f6368;font-size:13px">'+de.length+"\u4EF6</span></div>";if(de.length===0){h+='<div class="cd" style="text-align:center;color:#5f6368;padding:24px">\u3053\u306E\u65E5\u306E\u8A18\u9332\u306F\u3042\u308A\u307E\u305B\u3093</div>';}else{de.forEach(function(e){var mn=gMN(e.member_id),sn=gSN(e.site_id),ini=mn.substring(0,1);var st=sites.find(function(x){return x.id==e.site_id});var rl=(st&&st.rate_type==="hourly")?e.hours+"h":"1\u65E5";h+='<div class="day-item"><div class="avatar">'+ini+'</div><div class="info"><div class="sn">'+sn+'</div><div class="mn">'+mn+'</div></div><div class="hrs">'+rl+"</div></div>";});}h+='<button class="add-btn" onclick="showAddE()"><span class="material-symbols-outlined" style="font-size:18px">add</span>\u8A18\u9332\u3092\u8FFD\u52A0</button>';return h;}
function showAddE(){var p=selectedDate.split("-");var lb=p[1]+"/"+p[2];var so=sites.map(function(s){return '<option value="'+s.id+'">'+s.name+"</option>"}).join("");var mo=members.map(function(m){return '<option value="'+m.id+'">'+m.name+"</option>"}).join("");var d=document.createElement("div");d.className="mbg";d.id="eModal";d.innerHTML='<div class="mdl"><h3>'+lb+' \u306E\u8A18\u9332\u8FFD\u52A0</h3><label>\u73FE\u5834</label><select id="addS">'+so+'</select><label>\u30E1\u30F3\u30D0\u30FC</label><select id="addM">'+mo+'</select><label>\u6642\u9593\uFF08hourly\u306E\u5834\u5408\uFF09</label><input type="number" id="addH" value="8" min="0" max="24" step="0.5"><div class="mda"><button class="mc" onclick="clModal()">\u30AD\u30E3\u30F3\u30BB\u30EB</button><button class="ms" onclick="saveE()">\u4FDD\u5B58</button></div></div>';document.body.appendChild(d);}
function clModal(){var m=document.getElementById("eModal");if(m)m.remove()}
function saveE(){var si=document.getElementById("addS").value;var mi=document.getElementById("addM").value;var hr=parseFloat(document.getElementById("addH").value)||0;var body={company_id:company.id,date:selectedDate,site_id:parseInt(si),member_id:parseInt(mi),hours:hr};fetch(SB+"/attendance_entries",{method:"POST",headers:H,body:JSON.stringify(body)}).then(function(r){if(r.ok){clModal();ldMo().then(function(){renderCalendar()})}else{r.text().then(function(t){alert("\u4FDD\u5B58\u30A8\u30E9\u30FC: "+t)})}});}
function renderSummary(){var el=document.getElementById('t1'),as=sites.filter(function(s){return s.status!=='completed';}),now=new Date(),tm=entries.filter(function(e){var d=new Date(e.date);return d.getMonth()===now.getMonth();}),th=0;tm.forEach(function(e){if(e.start_time&&e.end_time){var s=e.start_time.split(':'),en=e.end_time.split(':');th+=(parseInt(en[0])-parseInt(s[0]))+(parseInt(en[1])-parseInt(s[1]))/60;}});var h='<div class="cd"><div class="ct2">今月のサマリー</div><div class="cr"><span class="l">稼働現場数</span><span class="v">'+as.length+'件</span></div><div class="cr"><span class="l">メンバー数</span><span class="v">'+members.length+'名</span></div><div class="cr"><span class="l">今月の出勤記録</span><span class="v">'+tm.length+'件</span></div><div class="cr"><span class="l">推定稼働時間</span><span class="v">'+th.toFixed(1)+'h</span></div></div><div class="cd"><div class="ct2">稼働中の現場</div>';as.forEach(function(s){h+='<span class="sc">'+s.name+'</span> ';});if(!as.length)h+='<span style="color:#5f6368;font-size:13px">現場なし</span>';h+='</div><div class="cd"><div class="ct2">直近の出勤</div>';entries.slice(0,5).forEach(function(e){var mem=members.find(function(mb){return mb.id===e.account_id;}),site=sites.find(function(s){return s.id===e.work_site_id;});h+='<div class="cr"><span class="l">'+e.date+' '+(mem?mem.name:'')+'</span><span class="v">'+(site?site.name:'--')+'</span></div>';});h+='</div>';el.innerHTML=h;}
function renderSites(){var el=document.getElementById('t2'),h='<h3 style="font-size:15px;margin-bottom:12px">現場一覧 ('+sites.length+'件)</h3>';sites.forEach(function(s){var st=s.status==='completed'?'完了':'稼働中',c=s.status==='completed'?'#5f6368':'#0d904f';h+='<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:500;font-size:15px">'+s.name+'</span><span style="font-size:12px;color:'+c+';font-weight:500">'+st+'</span></div>'+(s.address?'<div style="font-size:12px;color:#5f6368;margin-top:4px">'+s.address+'</div>':'')+'</div>';});if(!sites.length)h+='<div class="cd" style="text-align:center;color:#5f6368">現場なし</div>';el.innerHTML=h;}
function renderMembers(){var el=document.getElementById('t3'),h='<h3 style="font-size:15px;margin-bottom:12px">メンバー ('+members.length+'名)</h3>';members.forEach(function(m){var init=(m.name||'?')[0],role=m.role==='admin'?'管理者':'メンバー';h+='<div class="mi"><div class="ma">'+init+'</div><div style="flex:1"><div style="font-size:14px;font-weight:500">'+(m.name||'名前なし')+'</div><div style="font-size:12px;color:#5f6368">'+role+(m.team?' / '+m.team:'')+'</div></div></div>';});if(!members.length)h+='<div class="cd" style="text-align:center;color:#5f6368">メンバーなし</div>';el.innerHTML=h;}function renderReport(){var el=document.getElementById('t4'),now=new Date(),ms=now.getFullYear()+'年'+(now.getMonth()+1)+'月',tm=entries.filter(function(e){var d=new Date(e.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}),bs={};tm.forEach(function(e){var sid=e.work_site_id||'x';if(!bs[sid])bs[sid]={c:0,h:0};bs[sid].c++;if(e.start_time&&e.end_time){var s=e.start_time.split(':'),en=e.end_time.split(':');bs[sid].h+=(parseInt(en[0])-parseInt(s[0]))+(parseInt(en[1])-parseInt(s[1]))/60;}});var h='<h3 style="font-size:15px;margin-bottom:12px">'+ms+' 請求レポート</h3><div class="cd"><div class="ct2">現場別集計</div>',gt=0;Object.keys(bs).forEach(function(sid){var site=sites.find(function(s){return s.id==sid;}),d=bs[sid],amt=d.h*15000;gt+=amt;h+='<div class="cr"><span class="l">'+(site?site.name:'その他')+' ('+d.c+'日/'+d.h.toFixed(1)+'h)</span><span class="v">¥'+amt.toLocaleString()+'</span></div>';});if(!Object.keys(bs).length)h+='<div style="color:#5f6368;font-size:13px;padding:8px 0">今月の記録なし</div>';h+='</div>';var tx=Math.floor(gt*0.1);h+='<div class="cd"><div class="cr"><span class="l">小計</span><span class="v">¥'+gt.toLocaleString()+'</span></div><div class="cr"><span class="l">消費税 (10%)</span><span class="v">¥'+tx.toLocaleString()+'</span></div><div class="cr" style="font-size:16px;font-weight:700;border-top:2px solid var(--p);padding-top:8px;margin-top:4px"><span class="l">合計</span><span class="v" style="color:var(--p)">¥'+(gt+tx).toLocaleString()+'</span></div></div><button class="btn" style="margin-top:8px" onclick="showInvoice()">御請求書を作成</button>';el.innerHTML=h;}
function showInvoice(){var now=new Date(),ms=now.getFullYear()+'年'+(now.getMonth()+1)+'月',ds=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日',tm=entries.filter(function(e){var d=new Date(e.date);return d.getMonth()===now.getMonth();}),bs={};tm.forEach(function(e){var sid=e.work_site_id||'x';if(!bs[sid])bs[sid]={c:0,h:0};bs[sid].c++;if(e.start_time&&e.end_time){var s=e.start_time.split(':'),en=e.end_time.split(':');bs[sid].h+=(parseInt(en[0])-parseInt(s[0]))+(parseInt(en[1])-parseInt(s[1]))/60;}});var gt=0,rows='';Object.keys(bs).forEach(function(sid){var site=sites.find(function(s){return s.id==sid;}),d=bs[sid],amt=d.h*15000;gt+=amt;rows+='<tr><td>'+(site?site.name:'その他')+'</td><td class="r">'+d.c+'日</td><td class="r">'+d.h.toFixed(1)+'h</td><td class="r">¥15,000</td><td class="r">¥'+amt.toLocaleString()+'</td></tr>';});var tx=Math.floor(gt*0.1);document.querySelectorAll('.tc').forEach(function(t){t.classList.remove('a');});var iv=document.getElementById('invV');if(!iv){iv=document.createElement('div');iv.id='invV';document.getElementById('mc').appendChild(iv);}iv.style.display='block';iv.innerHTML='<button onclick="closeInvoice()" style="margin-bottom:12px;background:none;border:1px solid var(--ol);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px">← 戻る</button><div class="inv"><div style="display:flex;justify-content:space-between;align-items:start"><div><h2 style="text-align:left;font-size:22px;margin-bottom:4px;border:none">御請求書</h2><p style="font-size:12px;color:#666">'+ds+'</p></div><div class="stp">'+company.name.substring(0,3)+'</div></div><div style="margin:16px 0;padding:12px;background:#f9f9f9;border-radius:8px"><div style="font-size:13px;color:#666">請求先</div><div style="font-size:16px;font-weight:700">お客様各位</div></div><div style="font-size:13px;margin-bottom:4px">'+ms+'分 作業報告</div><table class="ivt"><tr><th>現場名</th><th>日数</th><th>時間</th><th>単価</th><th>金額</th></tr>'+rows+'</table><div style="text-align:right;margin-top:12px"><div style="font-size:13px">小計: ¥'+gt.toLocaleString()+'</div><div style="font-size:13px">消費税(10%): ¥'+tx.toLocaleString()+'</div><div style="font-size:18px;font-weight:700;color:var(--p);margin-top:4px;border-top:2px solid var(--p);padding-top:8px;display:inline-block">合計: ¥'+(gt+tx).toLocaleString()+'</div></div><div style="margin-top:20px;padding-top:12px;border-top:1px solid #eee;font-size:12px;color:#666"><div style="font-weight:500">'+company.name+'</div><div>発行日: '+ds+'</div></div></div>';}
function closeInvoice(){var iv=document.getElementById('invV');if(iv)iv.style.display='none';document.getElementById('t4').classList.add('a');}
function renderSettings(){var el=document.getElementById('t5'),items=[{i:'person',l:'アカウント情報',d:account?account.name+' ('+account.role+')':''},{i:'business',l:'会社情報',d:company?company.name:''},{i:'palette',l:'テーマ設定',d:'ライトモード'},{i:'notifications',l:'通知設定',d:'オン'},{i:'language',l:'言語',d:'日本語'},{i:'info',l:'バージョン',d:'2.0.0'},{i:'logout',l:'ログアウト',d:''}],h='<h3 style="font-size:15px;margin-bottom:8px">設定</h3>';items.forEach(function(it){var oc=it.i==='logout'?' onclick="doLogout()" style="cursor:pointer;color:#d93025"':'';h+='<div class="si"'+oc+'><div class="sl"><span class="ms material-symbols-outlined">'+it.i+'</span><div><div style="font-size:14px">'+it.l+'</div>'+(it.d?'<div style="font-size:12px;color:#5f6368">'+it.d+'</div>':'')+'</div></div><span class="ms material-symbols-outlined" style="color:#5f6368;font-size:20px">chevron_right</span></div>';});el.innerHTML=h;}
function doLogout(){company=null;account=null;sites=[];members=[];entries=[];document.getElementById('ms').style.display='none';document.getElementById('ls').style.display='flex';document.getElementById('ci').value='';document.getElementById('pi').value='';}
</script></body></html>
